<!DOCTYPE html>
<html>
  <head>
    <title>Juego Cazando</title>
    <link rel="stylesheet" href="cazando.css"/>
    <script src="utilitarios.js"></script>
  </head>
  <body onload="iniciarJuego()">

    <h1>Juego Cazando</h1>
    <p>Autor: Herlin Peñaherrera</p>
    <canvas id="areaJuego" width="500" height="400"></canvas>


    <div class="controles">
      <button onclick="moverArriba()">⬆</button>

      <button onclick="moverIzquierda()">⬅</button>

      <button onclick="moverDerecha()">➡</button>

    <div class="panel">
      <span>Puntos: <span id="txtPuntaje">0</span></span>
      <span>Tiempo: <span id="txtTiempo">10</span></span>
    </div>

    <p id="mensaje"></p>

     <script src="cazando.js"></script>
